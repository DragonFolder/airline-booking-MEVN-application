<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Sprint Airlines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="card" role="main">
    <img
      class="logo"
      src="https://t3.ftcdn.net/jpg/02/15/51/76/360_F_215517687_MLMCHbyaOb5z8OBffOUw6ASwXDTfjV5v.jpg"
      alt="Sprint Airlines plane logo">
    <p class="airline-name">Sprint Airlines</p>
    <div class="divider" aria-hidden="true"></div>
    <h1>Register</h1>
    <p class="subtitle">Register your account here</p>
    <form action="#" method="post" novalidate>
      <div class="field">
        <label for="fullname">Fullname</label>
        <input
          id="fullname"
          type="text"
          name="fullname"
          placeholder="Enter your fullname"
          autocomplete="fullname"
          required>
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="text"
          name="email"
          placeholder="Enter your email"
          autocomplete="email"
          required>
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="password"
          required>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input
          id="confirm-password"
          type="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="confirm-password-password"
          required>
      </div>
      <div class="row-meta">


      <button type="submit" class="btn-register">
        Register
      </button>

    </form>

  </div>
    <script src="register.js"></script>
</body>

</html>
