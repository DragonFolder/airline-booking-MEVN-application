<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection UI</title>
    <link rel="stylesheet" href="seats.css">
</head>
<body>
    <div class="container">
        <!-- Main Seat Selection Card -->
        <main class="booking-card">
            <header class="header">
                <h1>Select Your Seat</h1>
                <div class="legend">
                    <div class="item"><span class="dot first"></span> First</div>
                    <div class="item"><span class="dot business"></span> Business</div>
                    <div class="item"><span class="dot economy"></span> Economy</div>
                    <div class="item"><span class="dot taken"></span> Taken</div>
                </div>
            </header>

            <div class="seat-map-container">
                <div class="seat-map" id="seatMap">
                    <!-- Labels -->
                    <div class="label"></div><div class="label">A</div><div class="label">B</div><div class="label">C</div>
                    <div class="label"></div><div class="label">D</div><div class="label">E</div><div class="label">F</div>
                    <!-- Seats will be generated by JS -->
                </div>
            </div>
        </main>

        <!-- Right Side Preview -->
        <aside class="preview-card">
            <p class="preview-title">● BOARDING PASS PREVIEW</p>
            <div class="flight-info">
                <div class="route">
                    <div class="airport">
                        <h2>MNL</h2>
                        <span>Origin</span>
                    </div>
                    <div class="plane-icon">✈</div>
                    <div class="airport">
                        <h2>JFK</h2>
                        <span>Destination</span>
                    </div>
                </div>
                <div class="meta-data">
                    <div class="meta-item">
                        <label>DATE</label>
                        <p>2026-05-09</p>
                    </div>
                    <div class="meta-item">
                        <label>FLIGHT</label>
                        <p>SH-319</p>
                    </div>
                    <div class="meta-item">
                        <label>TOTAL</label>
                        <p class="price">$<span id="totalPrice">0</span></p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <button class="continue-btn">CONTINUE</button>

    <script src="seats.js"></script>
</body>
</html>
